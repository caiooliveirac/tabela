services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tabela
      POSTGRES_PASSWORD: tabela
      POSTGRES_DB: tabela
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabela"]
      interval: 3s
      timeout: 2s
      retries: 10

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tabela:tabela@db:5432/tabela
      PORT: "3000"
      NODE_ENV: development
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    ports:
      - "3001:3000"
    networks:
      internal:
        aliases:
          - tabela-api

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3001/tabela/api
      VITE_WS_URL: ws://localhost:3001/tabela/ws
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - internal

volumes:
  pgdata_dev:
  api_node_modules:
  web_node_modules:

networks:
  internal:
    driver: bridge
