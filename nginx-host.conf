# ═══════════════════════════════════════════════════════════════
# Nginx do HOST — adicionar dentro do server block existente
# ═══════════════════════════════════════════════════════════════
#
# Copie este bloco para dentro do server { } do seu site principal.
# O container web roda na porta 3001, o container api na 3000.
# O container web já faz proxy interno para o api, então basta
# apontar tudo para a porta 3001.

# Frontend + API (via nginx do container web)
location /tabela/ {
    proxy_pass http://127.0.0.1:3001/tabela/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# API direto (já coberto pelo proxy acima via container web nginx,
# mas caso queira bypass direto ao api container:)
location /tabela/api/ {
    proxy_pass http://127.0.0.1:3001/tabela/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# WebSocket
location /tabela/ws {
    proxy_pass http://127.0.0.1:3001/tabela/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
