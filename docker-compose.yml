services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tabela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tabela}
      POSTGRES_DB: ${POSTGRES_DB:-tabela}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tabela}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tabela}:${POSTGRES_PASSWORD:-tabela}@db:5432/${POSTGRES_DB:-tabela}
      PORT: "3000"
      NODE_ENV: production
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/tabela/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: always
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3001}:3001"
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
